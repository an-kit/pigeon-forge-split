<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon Forge 2026 🏔️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; }
        header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%); }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(90deg, #f39c12, #e74c3c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { color: #888; font-size: 1.1rem; }
        .photo-count { margin-top: 15px; display: inline-block; background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 20px; font-size: 0.9rem; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .photo-card { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .photo-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .photo-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .photo-card video { width: 100%; height: 200px; object-fit: cover; display: block; }
        .photo-info { padding: 12px; }
        .photo-label { color: #888; font-size: 0.85rem; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .lightbox.active { display: flex; }
        .lightbox img, .lightbox video { max-width: 90%; max-height: 80vh; }
        .lightbox-info { color: #888; margin-top: 15px; font-size: 0.9rem; }
        .close { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: white; padding: 15px 20px; cursor: pointer; font-size: 20px; border-radius: 8px; }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .prev { left: 20px; }
        .next { right: 20px; }
        .filter { text-align: center; padding: 20px; }
        .filter button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 20px; margin: 0 5px; border-radius: 20px; cursor: pointer; }
        .filter button.active { background: rgba(255,255,255,0.2); }
        footer { text-align: center; padding: 30px; color: #555; font-size: 0.8rem; }
    </style>
</head>

        <h1>🏔️ Pigeon Forge 2026</h1>
        <p class="subtitle">Making memories with family & friends</p>
        <span class="photo-count">📸 <span id="count">102</span> photos • 🎬 <span id="video-count">6</span> videos</span>
    </header>
    <div class="filter">
        <button class="active" onclick="filterAll()">All</button>
        <button onclick="filterPhotos()">Photos Only</button>
        <button onclick="filterVideos()">Videos Only</button>
    </div>
    <div class="gallery" id="gallery"></div>
    <div class="lightbox" id="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <button class="nav-btn prev" onclick="prevImage(event)">&#10094;</button>
        <div id="lightbox-content"></div>
        <button class="nav-btn next" onclick="nextImage(event)">&#10095;</button>
        <div class="lightbox-info" id="lightbox-info"></div>
    </div>
    <footer>Made with 🦞</footer>

        const videos = [
            {type: 'video', src: 'photos/video1.mp4', label: 'Video 1'},
            {type: 'video', src: 'photos/video2.mp4', label: 'Video 2'},
            {type: 'video', src: 'photos/video3.mp4', label: 'Video 3'},
            {type: 'video', src: 'photos/video4.mp4', label: 'Video 4'},
            {type: 'video', src: 'photos/video5.mp4', label: 'Video 5'},
            {type: 'video', src: 'photos/video6.mp4', label: 'Video 6'}
        ];
        let currentIndex = 0;
        let currentList = [...photos, ...videos].sort((a, b) => 
            parseInt(a.src.split('/')[1]) - parseInt(b.src.split('/')[1])
        );

        function render() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = currentList.map((item, i) => `
                <div class="photo-card" onclick="openLightbox(i)">
                    ${item.type === 'photo' 
                        ? `<img src="${item.src}" alt="${item.label}">`
                        : `<video src="${item.src}"></video>`}
                    <div class="photo-info">
                        <div class="photo-label">${item.label}</div>
                    </div>
                </div>
            `).join('');
        }

        function openLightbox(index) {
            currentIndex = index;
            const item = currentList[index];
            document.getElementById('lightbox-content').innerHTML = item.type === 'photo'
                ? `<img src="${item.src}">`
                : `<video src="${item.src}" controls autoplay></video>`;
            document.getElementById('lightbox-info').textContent = item.label;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
        function prevImage(e) { e.stopPropagation(); currentIndex = (currentIndex - 1 + currentList.length) % currentList.length; openLightbox(currentIndex); }
        function nextImage(e) { e.stopPropagation(); currentIndex = (currentIndex + 1) % currentList.length; openLightbox(currentIndex); }
        function filterAll() { currentList = [...photos, ...videos].sort((a, b) => parseInt(a.src.split('/')[1]) - parseInt(b.src.split('/')[1])); render(); document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active')); document.querySelector('.filter button').classList.add('active'); }
        function filterPhotos() { currentList = [...photos].sort((a, b) => parseInt(a.src.split('/')[1]) - parseInt(b.src.split('/')[1])); render(); document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active')); document.querySelectorAll('.filter button')[1].classList.add('active'); }
        function filterVideos() { currentList = [...videos].sort((a, b) => parseInt(a.src.split('/')[1]) - parseInt(b.src.split('/')[1])); render(); document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active')); document.querySelectorAll('.filter button')[2].classList.add('active'); }
